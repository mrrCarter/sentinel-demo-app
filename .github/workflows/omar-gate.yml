name: Omar Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Sentinelayer scan profile
        required: false
        default: deep
        type: choice
        options:
          - deep
          - nightly
      severity_gate:
        description: Severity threshold that blocks merge
        required: false
        default: P1
        type: choice
        options:
          - P0
          - P1
          - P2
          - none
      p2_max_allowed:
        description: Maximum allowed P2 findings before Omar Gate blocks merge
        required: false
        default: "5"
        type: string

permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  omar_gate:
    name: Omar Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Validate Sentinelayer token
        shell: bash
        env:
          SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SENTINELAYER_TOKEN}" ]; then
            echo "::warning::SENTINELAYER_TOKEN not set. Run: gh secret set SENTINELAYER_TOKEN --body <token>"
            echo "Skipping Omar Gate — run locally: npx sentinelayer-cli@latest /omargate deep --path ."
            exit 0
          fi
      - name: Run Omar Gate
        id: omar
        uses: mrrCarter/sentinelayer-v1-action@v1
        with:
          sentinelayer_token: ${{ secrets.SENTINELAYER_TOKEN }}
          scan_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.scan_mode || 'deep' }}
          severity_gate: ${{ github.event_name == 'workflow_dispatch' && inputs.severity_gate || 'P1' }}
      - name: Enforce merge thresholds
        shell: bash
        env:
          P0_COUNT: ${{ steps.omar.outputs.p0_count || '0' }}
          P1_COUNT: ${{ steps.omar.outputs.p1_count || '0' }}
          P2_COUNT: ${{ steps.omar.outputs.p2_count || '0' }}
          P2_MAX: ${{ github.event_name == 'workflow_dispatch' && inputs.p2_max_allowed || '5' }}
        run: |
          set -euo pipefail
          p0="$(echo "${P0_COUNT}" | tr -d '\r' | xargs)"
          p1="$(echo "${P1_COUNT}" | tr -d '\r' | xargs)"
          p2="$(echo "${P2_COUNT}" | tr -d '\r' | xargs)"
          p2_max="$(echo "${P2_MAX}" | tr -d '\r' | xargs)"
          if [ "${p0:-0}" -gt 0 ] || [ "${p1:-0}" -gt 0 ]; then
            echo "::error::Omar Gate blocked: P0=${p0}, P1=${p1}"
            exit 1
          fi
          if [ "${p2:-0}" -gt "${p2_max:-5}" ]; then
            echo "::error::Omar Gate blocked: P2=${p2} exceeds max ${p2_max}"
            exit 1
          fi
      - name: Omar summary
        shell: bash
        run: |
          echo "## Omar Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- gate: \`${{ steps.omar.outputs.gate_status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- findings: P0=${{ steps.omar.outputs.p0_count }} P1=${{ steps.omar.outputs.p1_count }} P2=${{ steps.omar.outputs.p2_count }} P3=${{ steps.omar.outputs.p3_count }}" >> "$GITHUB_STEP_SUMMARY"
